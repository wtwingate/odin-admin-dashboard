<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles/global.css" />
    <script
      src="https://kit.fontawesome.com/71bca80628.js"
      crossorigin="anonymous"
    ></script>
    <title>Dashboard</title>
  </head>
  <body>
    <header>
      <div>
        <span class="header-span">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="text" />
        </span>
        <span class="header-span">
          <a href="https://example.com/notifications"
            ><i class="fa-regular fa-bell"></i
          ></a>
          <a href="https://example.com/profile"><!-- avatar image --></a>
          <a href="https://example.com/profile">Morgan Oakley</a>
        </span>
      </div>
      <div>
        <span class="header-span">
          <!-- large avatar image -->
          <p>Hi there,</p>
          <p>Morgan Oakley (@morgan)</p>
        </span>
        <span class="header-span">
          <button>New</button>
          <button>Upload</button>
          <button>Share</button>
        </span>
      </div>
    </header>
    <aside id="sidebar">
      <h1><i class="fa-solid fa-cube"></i>Dashboard</h1>
      <nav>
        <a href="https://example.com/home"
          ><i class="fa-solid fa-house"></i>Home</a
        >
        <a href="https://example.com/profile"
          ><i class="fa-solid fa-address-card"></i>Profile</a
        >
        <a href="https://example.com/messages"
          ><i class="fa-solid fa-message"></i>Messages</a
        >
        <a href="https://example.com/history"
          ><i class="fa-solid fa-clock-rotate-left"></i>History</a
        >
        <a href="https://example.com/tasks"
          ><i class="fa-solid fa-list-check"></i>Tasks</a
        >
        <a href="https://example.com/communities" id="nav-group-border"
          ><i class="fa-solid fa-user-group"></i>Community</a
        >
        <a href="https://example.com/settings"
          ><i class="fa-solid fa-gear"></i>Settings</a
        >
        <a href="https://example.com/support"
          ><i class="fa-solid fa-circle-question"></i>Support</a
        >
        <a href="https://example.com/privacy"
          ><i class="fa-solid fa-shield-halved"></i>Privacy</a
        >
      </nav>
    </aside>
    <section id="projects">
      <h2>Your Projects</h2>
    </section>
    <section id="announcements">
      <h2>Announcements</h2>
    </section>
    <section id="trending">
      <h2>Trending</h2>
    </section>
  </body>
</html>
